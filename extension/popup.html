<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SoundPrint</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a202c;
      background: #ffffff;
    }
    .header {
      padding: 14px 16px 10px;
      background: #f0fdf4;
      border-bottom: 1px solid #bbf7d0;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #166534; }
    .header p { font-size: 11px; color: #4ade80; margin-top: 2px; }
    .stats { padding: 14px 16px; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #64748b; font-size: 12px; }
    .stat-value { font-weight: 600; font-size: 14px; color: #1e293b; }
    .stat-value.green { color: #16a34a; }
    .stat-value.blue { color: #0369a1; }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f1f5f9;
    }
    .clear-btn {
      width: 100%;
      padding: 8px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      font-size: 12px;
      color: #64748b;
      cursor: pointer;
    }
    .clear-btn:hover { background: #f1f5f9; }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      background: #d1d5db;
    }
    .status-dot.online { background: #22c55e; }
    .status-row {
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #94a3b8;
      padding: 8px 16px;
      border-bottom: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌱 SoundPrint</h1>
    <p>AI prompt carbon tracker</p>
  </div>
  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Checking backend...</span>
  </div>
  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">Prompts sent</span>
      <span class="stat-value" id="prompts-sent">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Rewrites accepted</span>
      <span class="stat-value green" id="rewrites-accepted">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">CO₂ this session</span>
      <span class="stat-value" id="total-co2">0.0000g</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">CO₂ saved</span>
      <span class="stat-value green" id="saved-co2">0.0000g</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Tokens saved</span>
      <span class="stat-value blue" id="saved-tokens">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Efficiency gain</span>
      <span class="stat-value blue" id="saved-pct">0%</span>
    </div>
  </div>
  <div class="footer">
    <button class="clear-btn" id="clear-btn">Clear session data</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
